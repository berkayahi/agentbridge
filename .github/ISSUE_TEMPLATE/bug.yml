name: Bug report
description: Report a reproducible AgentBridge problem without private data
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include tokens, CLI sessions, private repository content, or unredacted logs. Use the private process in SECURITY.md for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: AgentBridge version
      placeholder: commit or release
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: OS, architecture, systemd version
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Include sanitized, minimal reproduction steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Redacted diagnostics
      description: Provide doctor output or fake-repository evidence only after checking it for private data.
