# Copy this file to an untracked, private location and replace every placeholder.
# Never commit credentials. systemd credentials are loaded separately at runtime.
default_repository: sample-app
mode: standalone
# Managed mode is explicit and requires a completed enrollment record:
# mode: managed
# managed:
#   gateway_url: wss://controller.example.invalid/device
#   organization_id: org-example
#   device_id: device-example
#   identity_path: /srv/agentbridge/device-key.json
#   record_path: /srv/agentbridge/enrollment.json
#   state_path: /srv/agentbridge/managed-state.json
server:
  listen: 127.0.0.1:8787
  allowed_tailscale_identities:
    - operator@example.invalid

telegram:
  private_chat_only: true
  allowed_user_ids:
    - 123456789
  paired_chat_id: 123456789

spool:
  max_bytes: 67108864
  warning_watermark_bytes: 50331648
  critical_watermark_bytes: 58720256
  critical_reserve_bytes: 8388608

providers:
  codex:
    executable: /usr/local/bin/codex
    model: gpt-5.6-terra
  claude:
    executable: /usr/local/bin/claude
    model: opus

repositories:
  sample-app:
    checkout_path: /srv/agentbridge/checkouts/sample-app
    remote: origin
    base_ref: refs/heads/staging
    verification:
      - argv: ["go", "test", "./..."]
        dir: .
    # Keep real deployment URLs in your private, untracked configuration.
    deployment_url: https://staging.example.invalid
    delivery:
      # Delivery is opt-in. Enabling it also requires one exact allowed_ref.
      enabled: false
    # Task-scoped isolation is declared here but is not activated by the 1.x
    # daemon. A standard/strong policy is accepted only when the host reports
    # the matching OS sandbox capability at task launch.
    # isolation:
    #   tier: standard
    #   worktree_root: /srv/agentbridge/worktrees/sample-app
    #   network:
    #     mode: allowlist
    #     provider: [api.anthropic.com, chatgpt.com]
    #     package: [proxy.golang.org]
    #     test: [staging.example.invalid]
