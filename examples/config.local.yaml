# Public-safe example only. Copy it to a private path and replace placeholders.
default_repository: sample-project
server:
  listen: 127.0.0.1:8787
  allowed_tailscale_identities:
    - operator@example.invalid

telegram:
  private_chat_only: true
  allowed_user_ids:
    - 123456789
  paired_chat_id: 123456789

providers:
  codex:
    executable: /usr/local/bin/codex
    model: gpt-5.6-terra
  claude:
    executable: /usr/local/bin/claude
    model: opus

repositories:
  sample-project:
    checkout_path: /srv/agentbridge/checkouts/sample-project
    remote: origin
    base_ref: refs/heads/staging
    verification:
      - argv: ["go", "test", "./..."]
        dir: .
    deployment_url: https://staging.example.invalid
    delivery:
      enabled: false
